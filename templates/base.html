<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}DataNarrate{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Our custom CSS -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

      <!-- Brand / Logo -->
      <a class="navbar-brand fw-bold text-warning" href="{{ url_for('home') }}">
         DataNarrate
      </a>

      <!-- Mobile toggle button -->
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Nav links -->
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('home') }}">
              <i class="bi bi-house"></i> Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('gallery') }}">
              <i class="bi bi-collection"></i> Gallery
            </a>
          </li>
          <li class="nav-item">
            <a class="btn btn-warning text-dark fw-bold ms-2"
               href="{{ url_for('create') }}">
              <i class="bi bi-plus-circle"></i> New Story
            </a>
          </li>
        </ul>
      </div>

    </div>
  </nav>

  <!-- ── PAGE CONTENT ── -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- ── FOOTER ── -->
  <footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">
       DataNarrate &mdash; Built with Flask &amp; Bootstrap
    </p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- Our custom JS -->
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
